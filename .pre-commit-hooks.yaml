- id: static-analysis
  name: static analysis
  description: Static analysis linter.
  entry: static-analysis
  language: python
  types: [python]

- id: make-api-doc
  name: make api documentation
  description: creates an api.rst file for readthedocs
  entry: make-api-doc
  language: python
  types: [python]

- id: format-csv
  name: format CSV files
  description: Format CSV files (remove empty lines + sort).
  entry: format-csv
  language: python
  files: triplets\.csv$

- id: format-assistant-configuration
  name: format assistant_configuration.json files
  description: Format Json files (sort configuration).
  entry: format-assistant-configuration
  language: python
  files: assistant_configuration\.json$

- id: validate-triplets
  name: validate triplets files
  description: Validate triplets files format (no duplicate references).
  entry: validate-triplets
  language: python
  files: triplets\.csv$

- id: check-uuid-quality
  name: check UUID quality
  description: Detect hand-typed / non-random UUIDs in staged Python changes.
  entry: check-uuid-quality
  language: python
  types: [python]

- id: check-deployment-env-vars
  name: Check deployment env var consistency
  description: Warn when a new env var is added to some Helm deployments but not others.
  entry: check-deployment-env-vars
  language: python
  files: deploy/.+/templates/deployment\.yaml$

- id: hyro-pre-commit
  name: Hyro standard hooks
  language: script
  entry: ./run-hyro-hooks
  verbose: true